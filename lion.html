<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>충북대학교 멋쟁이사자처럼</title>
  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #0D0D0D;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      text-align: center;
      padding: 60px 80px;
      border: 1px solid rgba(255,107,0,0.3);
      border-radius: 20px;
      background: rgba(255,107,0,0.05);
    }

    .badge {
      display: inline-block;
      background: #FF6B00;
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    .emoji { font-size: 48px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🦁</div>
    <div class="badge">충북대학교 멋쟁이사자처럼</div>
    <h1>축하합니다! 🎉</h1>
    <p>실습을 잘 하고 계시네요!<br>앞으로도 함께 성장해봐요.</p>
  </div>
</body>
</html>
